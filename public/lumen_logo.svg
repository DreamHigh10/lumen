<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients, filters, and glows -->
  <defs>
    <!-- Background Radial Glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#141210" />
      <stop offset="100%" stop-color="#080706" />
    </radialGradient>
    
    <!-- Cybernetic Red Glow -->
    <radialGradient id="redEyeGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="35%" stop-color="#dc2626" />
      <stop offset="70%" stop-color="#991b1b" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>

    <!-- Metallic Gradient for Robot half -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78716c" />
      <stop offset="35%" stop-color="#44403c" />
      <stop offset="75%" stop-color="#292524" />
      <stop offset="100%" stop-color="#12100f" />
    </linearGradient>

    <!-- Rich Brown Human Skin Tone Gradient (Matches uploaded image of Black man) -->
    <linearGradient id="humanSkin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#693d25" />  <!-- Warm terracotta brown -->
      <stop offset="50%" stop-color="#4f2d1a" /> <!-- Rich mahogany brown -->
      <stop offset="100%" stop-color="#2d170b" /> <!-- Deep dark espresso -->
    </linearGradient>

    <!-- Glass Lens Reflection -->
    <linearGradient id="glassReflect" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular Icon Base Container -->
  <rect width="512" height="512" rx="128" fill="url(#bgGlow)" stroke="#1c1917" stroke-width="8" />

  <!-- Outer ambient glowing dual-color ring (Blue left, Red right - from the uploaded image background) -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="#1e293b" stroke-width="2" />
  
  <!-- Left Side Ambient Blue Glow -->
  <path d="M 256,12 A 244,244 0 0,0 256,500" fill="none" stroke="#3b82f6" stroke-width="6" stroke-opacity="0.35" filter="url(#glow)" />
  <path d="M 256,20 A 236,236 0 0,0 256,492" fill="none" stroke="#3b82f6" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="8 12" />

  <!-- Right Side Ambient Red Glow -->
  <path d="M 256,12 A 244,244 0 0,1 256,500" fill="none" stroke="#ef4444" stroke-width="6" stroke-opacity="0.35" filter="url(#glow)" />
  <path d="M 256,20 A 236,236 0 0,1 256,492" fill="none" stroke="#ef4444" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="8 12" />

  <!-- SPLIT PROFILE GRAPHIC -->
  <g id="lumen-split-face">
    
    <!-- LEFT SIDE: HUMAN (Rich brown skin tones, sleek smart glasses, short hair fade) -->
    <!-- Head Silhouette (Left Half) -->
    <path d="M 256,90 C 160,90 120,140 120,250 C 120,350 160,405 240,423 L 256,425 Z" fill="url(#humanSkin)" />
    
    <!-- Human Side Hair (Fade) -->
    <path d="M 256,90 C 170,90 135,120 132,185 C 165,180 205,180 256,180 Z" fill="#0c0705" />
    <path d="M 132,185 C 126,200 124,220 124,240 C 135,235 150,235 155,242 C 155,242 152,190 256,180" fill="#140d0a" opacity="0.4" />

    <!-- Left Ear -->
    <path d="M 120,230 C 98,230 98,272 120,272 Z" fill="#422212" stroke="#251208" stroke-width="2.5" />

    <!-- Human Eye -->
    <ellipse cx="188" cy="245" rx="18" ry="11" fill="#ffffff" />
    <circle cx="188" cy="245" r="8.5" fill="#1c0f0a" />
    <circle cx="190" cy="245" r="4" fill="#0d0502" />
    <circle cx="185" cy="242" r="3.5" fill="#ffffff" /> <!-- Pupil light reflection -->
    <path d="M 166,238 C 176,229 200,229 210,238" fill="none" stroke="#1a0a05" stroke-width="3" stroke-linecap="round" />
    <path d="M 162,223 C 178,212 202,212 216,223" fill="none" stroke="#0d0502" stroke-width="5.5" stroke-linecap="round" /> <!-- Thick crisp eyebrow -->

    <!-- Left Smart Glass Frame -->
    <rect x="150" y="226" width="82" height="38" rx="12" fill="none" stroke="#000000" stroke-width="8" />
    <rect x="150" y="226" width="82" height="38" rx="12" fill="url(#glassReflect)" />
    <!-- Glasses Bridge -->
    <path d="M 232,238 L 256,238" stroke="#000000" stroke-width="8" stroke-linecap="round" />
    <!-- Glasses Temple Frame -->
    <path d="M 150,236 L 114,236" stroke="#000000" stroke-width="5" stroke-linecap="round" />

    <!-- Nose & Mouth Contour -->
    <path d="M 256,288 L 232,301 L 256,310" fill="none" stroke="#251208" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Human Side Lips (Rich warm tone) -->
    <path d="M 220,360 C 232,367 248,367 256,364" fill="none" stroke="#3b150c" stroke-width="5" stroke-linecap="round" />
    <path d="M 224,360 C 234,361 247,361 256,360" fill="none" stroke="#522015" stroke-width="2.5" stroke-linecap="round" />

    <!-- Mustache & Goatee touch-ups (Subtle) -->
    <path d="M 228,348 C 236,344 248,344 256,346" fill="none" stroke="#0d0705" stroke-width="3" opacity="0.8" stroke-linecap="round" />
    <path d="M 235,372 C 242,377 250,377 256,375" fill="none" stroke="#0d0705" stroke-width="4.5" opacity="0.8" stroke-linecap="round" />


    <!-- RIGHT SIDE: CYBORG (Intricate cybernetics, gold & blue trace paths, glowing red eye) -->
    <!-- Cybernetic Head Silhouette (Right Half) -->
    <path d="M 256,90 C 352,90 392,140 392,250 C 392,350 352,405 272,423 L 256,425 Z" fill="url(#metalGrad)" />

    <!-- Right Cybernetic Mechanical Sensor Ear -->
    <rect x="384" y="232" width="14" height="38" rx="5" fill="#44403c" stroke="#1c1917" stroke-width="2.5" />
    <circle cx="391" cy="251" r="3.5" fill="#ef4444" />
    <path d="M 391,240 L 391,262" stroke="#ef4444" stroke-width="1" stroke-opacity="0.6" />

    <!-- Intricate Blue/Cyan Silicon Circuit Paths (Matches the blue-glowing trace in uploaded image) -->
    <path d="M 256,155 L 295,155 L 320,125 L 355,125" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-opacity="0.8" filter="url(#glow)" />
    <path d="M 256,155 L 295,155 L 320,125 L 355,125" fill="none" stroke="#60a5fa" stroke-width="1.5" />
    <circle cx="355" cy="125" r="4" fill="#60a5fa" />
    
    <path d="M 285,155 L 300,170 L 330,170" fill="none" stroke="#3b82f6" stroke-width="2" stroke-opacity="0.7" />
    <circle cx="330" cy="170" r="3" fill="#60a5fa" />

    <!-- Gold/Yellow Circuit Elements -->
    <path d="M 320,390 L 355,355 L 355,310" fill="none" stroke="#eab308" stroke-width="2" stroke-opacity="0.8" />
    <circle cx="355" cy="310" r="4.5" fill="#facc15" />

    <!-- Red Laser Targeter Traces -->
    <path d="M 256,330 L 290,330 L 315,355 L 340,355" fill="none" stroke="#ef4444" stroke-width="2" stroke-opacity="0.7" />
    <circle cx="340" cy="355" r="3.5" fill="#f87171" />

    <!-- Armor Plate Partition Seams -->
    <path d="M 256,90 L 256,425" stroke="#12100f" stroke-width="6" stroke-linecap="round" /> <!-- Main Split Seam -->
    <path d="M 256,180 C 300,180 345,195 372,212" fill="none" stroke="#1c1917" stroke-width="4.5" stroke-linecap="round" />
    <path d="M 256,332 C 300,332 345,342 372,362" fill="none" stroke="#1c1917" stroke-width="4.5" stroke-linecap="round" />
    <circle cx="275" cy="115" r="3" fill="#292524" />
    <circle cx="335" cy="375" r="3" fill="#292524" />

    <!-- Robotic Eye Cavity (Right) -->
    <rect x="280" y="226" width="82" height="38" rx="12" fill="#0d0a09" stroke="#33302e" stroke-width="5" />
    
    <!-- Concentric Camera Iris Rings -->
    <circle cx="321" cy="245" r="24" fill="none" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4" />
    <circle cx="321" cy="245" r="18" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.6" />
    <circle cx="321" cy="245" r="14" fill="none" stroke="#ef4444" stroke-width="2.5" />
    
    <!-- Aperture Blades lines -->
    <line x1="321" y1="231" x2="321" y2="259" stroke="#ef4444" stroke-width="1" stroke-opacity="0.5" />
    <line x1="307" y1="245" x2="335" y2="245" stroke="#ef4444" stroke-width="1" stroke-opacity="0.5" />
    <line x1="311" y1="235" x2="331" y2="255" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3" />

    <!-- Cybernetic Eye Red Glow (Terminal Lens Eye) -->
    <circle cx="321" cy="245" r="9" fill="#ef4444" filter="url(#glow)" />
    <circle cx="321" cy="245" r="3" fill="#ffffff" />

    <!-- Robotic Glasses Connector (Continuing the frame theme symmetrically) -->
    <rect x="280" y="226" width="82" height="38" rx="12" fill="none" stroke="#44403c" stroke-width="4.5" stroke-opacity="0.9" />
    <path d="M 362,236 L 384,236" stroke="#44403c" stroke-width="4" stroke-linecap="round" />

    <!-- Mechanical Mouth Plate Detail -->
    <path d="M 256,364 L 282,360 L 282,368 Z" fill="#1c1917" stroke="#44403c" stroke-width="2" />
    <line x1="256" y1="364" x2="282" y2="364" stroke="#ef4444" stroke-width="2.5" />
  </g>

  <!-- Cybernetic Red Eye Aura Overlay -->
  <circle cx="321" cy="245" r="48" fill="url(#redEyeGlow)" opacity="0.4" style="mix-blend-mode: screen;" />
</svg>
